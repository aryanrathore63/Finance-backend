version: '3.8'

services:
  finance-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-backend-api
    ports:
      - "5141:80"
      - "7292:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLs=http://+:80;https://+:443
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/finance.db
    volumes:
      - ./data:/app/data
    networks:
      - finance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  finance-network:
    driver: bridge

volumes:
  finance-data:
    driver: local
